<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD54F; stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FB8C00; stop-opacity:1" />
    </linearGradient>
    
    <filter id="softShadow" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.5"/>
    </filter>
  </defs>

  <g stroke="url(#goldGrad)" stroke-width="10" stroke-linecap="round">
    <path d="M120 30 v50 M160 30 v50 M200 30 v50 M240 30 v50 M280 30 v50" />
    <path d="M120 320 v50 M160 320 v50 M200 320 v50 M240 320 v50 M280 320 v50" />
    <path d="M30 120 h50 M30 160 h50 M30 200 h50 M30 240 h50 M30 280 h50" />
    <path d="M320 120 h50 M320 160 h50 M320 200 h50 M320 240 h50 M320 280 h50" />
  </g>

  <rect x="75" y="75" width="250" height="250" rx="15" fill="#222" filter="url(#softShadow)"/>
  
  <path d="M 95 95 L 120 105 L 105 130 Z" fill="url(#goldGrad)" />

  <g stroke="url(#goldGrad)" stroke-width="1.5" fill="none" opacity="0.3">
    <path d="M200 300 V240 M180 300 V270 L200 250 M220 300 V270 L200 250" />
    <path d="M160 300 V285 L200 255 M240 300 V285 L200 255" />
    <path d="M140 300 V290 L200 260 M260 300 V290 L200 260" />
    <circle cx="200" cy="240" r="2.5" fill="url(#goldGrad)" />
  </g>

  <text x="200" y="225" 
        font-family="Impact, sans-serif" 
        font-size="90" 
        text-anchor="middle" 
        fill="url(#goldGrad)" 
        style="letter-spacing: -1px;">eSIM</text>
</svg>
